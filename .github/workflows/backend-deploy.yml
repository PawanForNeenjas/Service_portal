name: Backend Deploy

on:
  push:
    branches:
      - master
    paths:
      - backend/**
      - render.yaml
      - .github/workflows/backend-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Validate Render hook secret
        working-directory: .
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing required GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Trigger Render deploy
        working-directory: .
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent --retry 3 --retry-connrefused --request POST "$RENDER_DEPLOY_HOOK_URL"
