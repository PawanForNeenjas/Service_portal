name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - eslint.config.js
      - vite.config.ts
      - tsconfig.json
      - tsconfig.app.json
      - tsconfig.node.json
      - tailwind.config.ts
      - postcss.config.js
      - index.html
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate frontend environment
        run: |
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "Missing required GitHub secret: VITE_API_URL"
            exit 1
          fi

      - name: Resolve Vite base path
        run: |
          if [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            echo "VITE_BASE_PATH=${{ vars.VITE_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Prepare SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
